<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT TOOLS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <h1>OSINT-TOOLS</h1>

        <hr>

        <div class="categories">

            <button class="category" data-category="emails">
                Emails Osint-Tools
            </button>

            <button class="category" data-category="ip">
                IP Osint-Tools
            </button>

            <button class="category" data-category="domain">
                Domain Osint-Tools
            </button>

            <button class="category" data-category="search">
                Search Osint-Tools
            </button>

        </div>

    </div>

    <!-- Middle -->
    <div class="middle">

        <div id="toolsList">

            <!-- JavaScript will create the 10 tools here -->

        </div>

    </div>

    <!-- Right -->
    <div class="right">

        <div class="tool-details">

            <h2 id="toolTitle">
                Select Tool
            </h2>

            <p id="toolDescription">
                Choose one of the tools to display its description.
            </p>

            <a
                id="toolLink"
                href="#"
                target="_blank">
                Tool Link
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
